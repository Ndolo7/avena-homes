name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel in-flight deployments

jobs:
  # ── Build & Push Docker images ────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: runtime
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: runner
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS via SSH ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-22.04
    needs: build-push
    environment: production   # Requires manual approval gate in GitHub UI

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            echo "── Deploying avena-homes ──────────────────────────────"
            cd /opt/avena-homes

            # Pull latest code
            git pull origin main

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Rolling restart: migrate first, then restart services
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py migrate --noinput

            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-build

            # Health check — wait up to 60s for backend
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/api/auth/token/ > /dev/null 2>&1; then
                echo "Backend healthy after ${i}x5s"
                break
              fi
              echo "Waiting for backend... attempt $i/12"
              sleep 5
            done

            # Prune unused images
            docker image prune -f

            echo "── Deployment complete ────────────────────────────────"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Roll back to previous image on failure
            cd /opt/avena-homes
            docker compose -f docker-compose.prod.yml up -d --no-build
            echo "ROLLBACK executed due to deployment failure"
