version: "3.9"

# ── Production compose ────────────────────────────────────────────────────────
# Uses the multi-stage Dockerfiles and Nginx reverse proxy.
# Deploy:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Required secrets (set via environment or a .env.prod file):
#   DATABASE_URL, SECRET_KEY, PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY,
#   REDIS_URL, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avena_homes}
      POSTGRES_USER: ${POSTGRES_USER:-avena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avena}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      target: runtime
    restart: always
    env_file: ./backend/.env.prod
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application -c gunicorn.conf.py"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/auth/token/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build:
      context: ./backend
      target: runtime
    restart: always
    env_file: ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l warning -c 4

  celery_beat:
    build:
      context: ./backend
      target: runtime
    restart: always
    env_file: ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com/api}
    restart: always
    environment:
      API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/static:ro
      - media_files:/media:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $!;
      done"

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  certbot_www:
